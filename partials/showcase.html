<section id="showcase" class="block reveal">
    <h2 class="section-title">Interactive showcase</h2>

    <div class="showcase-pick" role="tablist" aria-label="Showcase mode">
        <button type="button" id="showcase-btn-code" aria-selected="true" aria-controls="showcase-code">
            <span>Code &amp; Engineering</span>
            <span class="sub">Repos, snippets, live demos</span>
        </button>
        <button type="button" id="showcase-btn-data" aria-selected="false" aria-controls="showcase-data">
            <span>Data &amp; Machine Learning</span>
            <span class="sub">Charts, notebooks, model cards</span>
        </button>
        <button type="button" id="showcase-btn-creative" aria-selected="false" aria-controls="showcase-creative">
            <span>Creative &amp; Design</span>
            <span class="sub">Photoshop, brand, motion stills</span>
        </button>
    </div>

    <div id="showcase-code" class="showcase-panel active" role="tabpanel">
        <div class="placeholder-grid" aria-hidden="true">
            <div class="placeholder-tile">Upload 1</div>
            <div class="placeholder-tile">Upload 2</div>
            <div class="placeholder-tile">Upload 3</div>
        </div>
    </div>

    <div id="showcase-data" class="showcase-panel" role="tabpanel">
        <div class="placeholder-grid" aria-hidden="true">
            <div class="placeholder-tile">Chart / viz</div>
            <div class="placeholder-tile">Notebook</div>
            <div class="placeholder-tile">Metrics</div>
        </div>
    </div>

    <div id="showcase-creative" class="showcase-panel" role="tabpanel">
        <div class="placeholder-grid" aria-hidden="true">
            <div class="placeholder-tile">Brand</div>
            <div class="placeholder-tile">Apparel</div>
            <div class="placeholder-tile">Social</div>
        </div>
    </div>
</section>
